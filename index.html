<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Economist Feed</title>
    <style>
        body { background-color: #fafafa; font-family: -apple-system, sans-serif; margin: 0; padding: 20px; }
        .feed-container { max-width: 600px; margin: 0 auto; }
        .card { background: white; border: 1px solid #dbdbdb; border-radius: 8px; margin-bottom: 30px; overflow: hidden; padding: 15px; }
        .error { color: red; background: #fff0f0; padding: 20px; border-radius: 8px; border: 1px solid red; }
    </style>
</head>
<body>

    <div class="feed-container" id="feed">
        <h2 id="status">Connecting to proxy...</h2>
    </div>

    <script>
        const statusEl = document.getElementById('status');
        const rssUrl = "https://www.economist.com/sections/main/rss.xml";
        const proxyUrl = `https://corsproxy.io/?url=${encodeURIComponent(rssUrl)}`;

        fetch(proxyUrl)
            .then(response => {
                if (!response.ok) throw new Error('HTTP error ' + response.status);
                return response.text();
            })
            .then(str => {
                const parser = new DOMParser();
                const xml = parser.parseFromString(str, "text/xml");
                const items = xml.querySelectorAll("item");
                
                if (items.length === 0) {
                    throw new Error("No items found in feed. The feed might be empty or formatted incorrectly.");
                }

                const feedContainer = document.getElementById('feed');
                feedContainer.innerHTML = ''; 

                items.forEach(item => {
                    const title = item.querySelector("title")?.textContent || "No Title";
                    const link = item.querySelector("link")?.textContent || "#";
                    const description = item.querySelector("description")?.textContent || "";

                    const card = document.createElement('div');
                    card.className = 'card';
                    card.innerHTML = `
                        <h3><a href="${link}" target="_blank">${title}</a></h3>
                        <p>${description}</p>
                    `;
                    feedContainer.appendChild(card);
                });
            })
            .catch(err => {
                statusEl.innerHTML = `<div class="error"><strong>Error:</strong> ${err.message}<br><br>Please copy this message and send it to me.</div>`;
            });
    </script>
</body>
</html>
