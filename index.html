<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Economist Feed</title>
    <style>
        :root {
            --economist-red: #e3120b;
            --background: #000;
            --text-white: #ffffff;
        }

        body, html { margin: 0; padding: 0; height: 100%; overflow: hidden; background: var(--background); font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; }
        
        #story-container { width: 100vw; height: 100vh; position: relative; display: flex; flex-direction: column; justify-content: flex-end; color: var(--text-white); }
        
        /* Progress Bar */
        #progress-container { position: absolute; top: 15px; left: 10px; right: 10px; display: flex; gap: 5px; z-index: 10; }
        .progress-bar { flex: 1; height: 3px; background: rgba(255,255,255,0.3); border-radius: 2px; }
        .progress-fill { height: 100%; background: var(--text-white); width: 0%; }

        /* Text Content */
        #content-area { padding: 40px; padding-bottom: 100px; background: linear-gradient(to top, rgba(0,0,0,0.9), transparent); }
        h1 { font-size: 2rem; margin-bottom: 15px; line-height: 1.2; }
        p { font-size: 1.1rem; opacity: 0.9; line-height: 1.6; }

        /* Button */
        #read-btn { display: inline-block; margin-top: 20px; padding: 12px 25px; border: 1px solid var(--text-white); color: var(--text-white); text-decoration: none; font-weight: bold; cursor: pointer; }
        
        /* Click Regions */
        .nav-zone { position: absolute; top: 0; bottom: 0; width: 50%; z-index: 5; }
        #nav-left { left: 0; cursor: w-resize; }
        #nav-right { right: 0; cursor: e-resize; }
    </style>
</head>
<body>

    <div id="progress-container"></div>
    <div id="story-container">
        <div id="content-area">
            <h1 id="title">Loading...</h1>
            <p id="description"></p>
            <a id="read-btn" href="#" target="_blank">Read Full Article</a>
        </div>
    </div>

    <div id="nav-left" class="nav-zone"></div>
    <div id="nav-right" class="nav-zone"></div>

    <script>
        const RSS_URL = 'https://www.economist.com/business/rss.xml';
        const PROXY = 'https://api.allorigins.win/get?url=';
        let stories = [];
        let currentIndex = 0;
        let timer;
        const DURATION = 8000; // 8 seconds per story

        async function fetchRSS() {
            try {
                const response = await fetch(PROXY + encodeURIComponent(RSS_URL));
                const data = await response.json();
                const parser = new DOMParser();
                const xml = parser.parseFromString(data.contents, "text/xml");
                const items = xml.querySelectorAll("item");
                
                stories = Array.from(items).slice(0, 5).map(item => ({
                    title: item.querySelector("title").textContent,
                    description: item.querySelector("description")?.textContent.replace(/<[^>]*>?/gm, '').substring(0, 150) + "...",
                    link: item.querySelector("link").textContent
                }));
                
                initStories();
            } catch (e) {
                document.getElementById('title').innerText = "Error loading feed. CORS or RSS limit reached.";
            }
        }

        function initStories() {
            const container = document.getElementById('progress-container');
            stories.forEach((_, i) => {
                const bar = document.createElement('div');
                bar.className = 'progress-bar';
                bar.innerHTML = `<div class="progress-fill" id="fill-${i}"></div>`;
                container.appendChild(bar);
            });
            showStory(0);
        }

        function showStory(index) {
            currentIndex = index;
            document.getElementById('title').innerText = stories[index].title;
            document.getElementById('description').innerText = stories[index].description;
            document.getElementById('read-btn').href = stories[index].link;
            
            // Reset progress
            document.querySelectorAll('.progress-fill').forEach(f => f.style.width = '0%');
            
            if (timer) clearTimeout(timer);
            animateProgress(index);
        }

        function animateProgress(index) {
            const fill = document.getElementById(`fill-${index}`);
            fill.style.transition = `width ${DURATION}ms linear`;
            fill.style.width = '100%';
            
            timer = setTimeout(() => {
                if (currentIndex < stories.length - 1) {
                    showStory(currentIndex + 1);
                }
            }, DURATION);
        }

        document.getElementById('nav-left').onclick = () => { if(currentIndex > 0) showStory(currentIndex - 1); };
        document.getElementById('nav-right').onclick = () => { if(currentIndex < stories.length - 1) showStory(currentIndex + 1); };

        fetchRSS();
    </script>
</body>
</html>
