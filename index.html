<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Economist Feed</title>
    <style>
        body { background-color: #fafafa; font-family: -apple-system, sans-serif; margin: 0; padding: 20px; }
        .feed-container { max-width: 600px; margin: 0 auto; }
        .card { background: white; border: 1px solid #dbdbdb; border-radius: 8px; margin-bottom: 30px; overflow: hidden; padding: 15px; }
        .card h3 { margin-top: 0; color: #333; }
        .error { color: red; padding: 20px; border: 1px solid red; border-radius: 8px; }
    </style>
</head>
<body>

    <div class="feed-container" id="feed">
        <h2 id="status">Fetching feed...</h2>
    </div>

    <script>
        const statusEl = document.getElementById('status');
        const feedContainer = document.getElementById('feed');
        
        // This API converts XML to JSON automatically
        const url = "https://api.rss2json.com/v1/api.json?rss_url=https://www.economist.com/sections/main/rss.xml";

        fetch(url)
            .then(response => response.json())
            .then(data => {
                if (data.status === 'ok') {
                    statusEl.style.display = 'none'; // Hide loading
                    
                    data.items.forEach(item => {
                        const card = document.createElement('div');
                        card.className = 'card';
                        
                        // We use the JSON data directly
                        card.innerHTML = `
                            <h3><a href="${item.link}" target="_blank" style="text-decoration:none; color:black;">${item.title}</a></h3>
                            <p>${item.description}</p>
                            <small>${new Date(item.pubDate).toLocaleDateString()}</small>
                        `;
                        feedContainer.appendChild(card);
                    });
                } else {
                    throw new Error(data.message || "Unknown API error");
                }
            })
            .catch(err => {
                statusEl.innerHTML = `<div class="error"><strong>Error:</strong> ${err.message}</div>`;
            });
    </script>
</body>
</html>
