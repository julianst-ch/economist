<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Business Feed</title>
    <style>
        body { background-color: #fafafa; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; margin: 0; padding: 20px; color: #262626; }
        .feed-container { max-width: 600px; margin: 0 auto; }
        .card { background: white; border: 1px solid #dbdbdb; border-radius: 8px; margin-bottom: 24px; overflow: hidden; }
        .content { padding: 16px; }
        .title { font-size: 16px; font-weight: 600; margin: 0 0 8px 0; line-height: 1.4; }
        .title a { text-decoration: none; color: #262626; }
        .date { font-size: 12px; color: #8e8e8e; text-transform: uppercase; }
        .desc { font-size: 14px; color: #484848; margin-top: 8px; line-height: 1.4; }
        #status { text-align: center; margin-top: 50px; }
    </style>
</head>
<body>

    <div class="feed-container" id="feed">
        <div id="status">Loading articles...</div>
    </div>

    <script>
        // We use rss2json, a public proxy, to convert XML to JSON
        const url = "https://api.rss2json.com/v1/api.json?rss_url=https://www.economist.com/business/rss.xml";
        const feedContainer = document.getElementById('feed');
        const statusEl = document.getElementById('status');

        fetch(url)
            .then(res => res.json())
            .then(data => {
                if (data.status !== "ok") throw new Error("Could not fetch data");
                
                statusEl.style.display = 'none';
                data.items.forEach(item => {
                    const card = document.createElement('div');
                    card.className = 'card';
                    card.innerHTML = `
                        <div class="content">
                            <div class="date">${new Date(item.pubDate).toLocaleDateString()}</div>
                            <h2 class="title"><a href="${item.link}" target="_blank">${item.title}</a></h2>
                            <div class="desc">${item.description}</div>
                        </div>
                    `;
                    feedContainer.appendChild(card);
                });
            })
            .catch(err => {
                statusEl.innerHTML = `
                    <div style="color:red">
                        <h3>Connection Blocked</h3>
                        <p>The Economist's security is currently blocking the proxy service.</p>
                        <p><em>To fix this, you must use the 'GitHub Actions' method instead of this single-file method.</em></p>
                    </div>
                `;
            });
    </script>
</body>
</html>
